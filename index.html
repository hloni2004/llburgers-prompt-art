<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo2.svg" />
    <title>LL Burgers – Premium Handcrafted Burgers</title>
    <meta name="description" content="LL Burgers delivers premium handcrafted burgers made from the finest ingredients, grilled to perfection. Order online for pickup or delivery." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta property="og:title" content="LL Burgers – Premium Handcrafted Burgers" />
    <meta property="og:description" content="LL Burgers delivers premium handcrafted burgers made from the finest ingredients, grilled to perfection. Order online for pickup or delivery." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <!-- Splash loader – visible until React mounts -->
    <div id="splash" style="
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: hsl(24, 53%, 97.6%);
      transition: opacity 0.4s ease;
    ">
      <img src="/logo2.svg" alt="LL Burgers" style="
        height: 11rem; width: auto;
        animation: splash-bounce 0.8s ease infinite;
      " />
    </div>
    <style>
      @keyframes splash-bounce {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-20px); }
      }
    </style>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
